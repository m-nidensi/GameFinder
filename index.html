<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Finder</title>

    <!-- conecting to css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <!-- navigation bar -->
        <nav>
            <a href="index.html">Home</a>
            <a href="saved.html">Favorites</a>
            <a href="recommendations.html">Recommendations</a>
        </nav>
    </header>

    <main>
        <!-- page tital: -->
        <h1>Game Finder</h1>

        <section class="form-section">
            <p> Search for games and discover new favorites.</p>

            <!-- from for search input with submit button named search.and a filter that has 
             ganra options. -->
            <form id="search-form">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search for a game..."
                    required
                >
                <select id="genre-filter">
                    <option value="all">All Genres</option>
                    <option value="action">Action</option>
                    <option value="rpg">RPG</option>
                    <option value="strategy">Strategy</option>
                    <option value="adventure">Adventure</option>
                </select>

                <button type="submit">Search</button>
            </form>
        </section>

        <!-- shows what page we are on from searched material,
          gives as posibility to look for more with buttons -->
        <div id="pagination">
            <button id="previous-btn">Previous</button>
            <span id="page-number">Page 1</span>
            <button id="next-btn">Next</button>
        </div>

        <!-- result section/ should contain search results layter on -->
         <!-- it has header, (loading, error for layter) and div of results -->
        <section class="result-section">
            <h2>Results</h2>
            <p id="loading-message"></p>
            <p id="error-message"></p>
            <div id="games-container"></div>
        </section>

    </main>

    <footer>
        <p>Game Finder Project</p>
    </footer>

    <!-- conecting to js -->
    <script type="module" src="js/main.js" defer></script>
</body>
</html>
